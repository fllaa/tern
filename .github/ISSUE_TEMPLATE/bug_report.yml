name: Bug report
description: Something in Tern is broken
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux (X11)
        - Linux (Wayland)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tern version
      description: From the About screen, or the git commit if building from source.
      placeholder: "0.1.0 / abc1234"
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Distro / OS version
      placeholder: "Ubuntu 24.04 / macOS 15.5 / Windows 11 24H2"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect to …
        2. Run …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (include logs / screenshots if relevant)
    validations:
      required: true
