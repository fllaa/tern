name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the toolchain + components; this installs it.
      - run: rustup toolchain install
      - run: cargo fmt --all --check

  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux system deps (Tauri / WebKitGTK 4.1 + keyring backend)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev gnome-keyring dbus
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build UI (frontendDist must exist for the desktop crate)
        run: bun run --filter @tern/ui build
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests (Linux — under a session D-Bus with an unlocked keyring,
          so the Spike 4 secret-service round-trip runs for real)
        if: runner.os == 'Linux'
        run: |
          dbus-run-session -- bash -c '
            echo -n "ci-keyring" | gnome-keyring-daemon --unlock --components=secrets --daemonize
            cargo test --workspace --locked
          '
      - name: Tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo test --workspace --locked
