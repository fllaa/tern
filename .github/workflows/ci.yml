name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      # rust-toolchain.toml pins the toolchain + components; this installs it.
      - run: rustup toolchain install
      - run: cargo fmt --all --check

  ui:
    name: biome + vitest + playwright
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx biome ci
      - run: bun run --filter @tern/ui typecheck
      - run: bun run --filter @tern/ui test

      # Browser tier. Vitest runs under jsdom, which has no layout engine and
      # reports every offsetWidth as 0 — the one condition under which
      # react-resizable-panels also discards `defaultSize`. A sidebar capped at
      # 40px therefore passed tsc, biome and the whole unit suite (c8f444a).
      # These steps are what make that class of bug visible.
      - name: Resolve Playwright version
        id: playwright
        # The cache key has to track the version: browser builds are pinned per
        # Playwright release, so a stale cache means a browser it cannot drive.
        run: echo "version=$(bunx playwright --version | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Install Chromium system libraries
        # The cache restores ~/.cache/ms-playwright, but --with-deps also puts
        # shared libraries in /usr/lib, which no cache covers. A cache hit still
        # needs them or Chromium fails to launch.
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium
      - run: bun run --filter @tern/ui test:e2e
      - name: Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: ui/test-results/
          retention-days: 7
    # Linux-only on purpose: lint, unit-test and layout results do not vary by
    # OS, and the 3-OS `test` job already runs the UI build (which includes tsc)
    # on every platform. This one exists for fast feedback — the Chromium
    # download is the only slow part and it is cached across runs.

  test:
    name: clippy + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Linux system deps (Tauri / WebKitGTK 4.1 + keyring backend)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev gnome-keyring dbus
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build UI (frontendDist must exist for the desktop crate)
        run: bun run --filter @tern/ui build
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Tests (Linux — under a session D-Bus with an unlocked keyring,
          so the Spike 4 secret-service round-trip runs for real)
        if: runner.os == 'Linux'
        run: |
          dbus-run-session -- bash -c '
            echo -n "ci-keyring" | gnome-keyring-daemon --unlock --components=secrets --daemonize
            cargo test --workspace --locked
          '
      - name: Tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo test --workspace --locked

  integration:
    name: rig integration (ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Linux system deps (Tauri / WebKitGTK 4.1 + keyring backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev gnome-keyring dbus
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build UI (frontendDist must exist for the desktop crate)
        run: bun run --filter @tern/ui build
      # Without this the rig is down, require_rig! makes every integration test
      # skip, and the suite passes while exercising nothing. macOS and Windows
      # runners have no Docker, so they keep skipping — which is exactly the
      # property require_rig! exists to preserve.
      - name: Start sshd rig (OpenSSH, dropbear, publickey-only OpenSSH)
        run: ./scripts/sshd-rig.sh up
      # Without these every test in core-ssh/tests/keys.rs skips, and the
      # auth-chain test that needs an unauthorised key skips with them — the
      # suite would stay green while exercising none of the key handling.
      - name: Generate private-key fixtures
        run: ./scripts/gen-key-fixtures.sh
      - name: Integration tests against the rig
        run: |
          dbus-run-session -- bash -c '
            echo -n "ci-keyring" | gnome-keyring-daemon --unlock --components=secrets --daemonize
            cargo test --workspace --locked
          '
      - name: Rig logs on failure
        if: failure()
        run: docker compose -f docker/compose.yml logs --tail=100
