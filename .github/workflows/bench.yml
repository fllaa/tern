name: Throughput bench

# The Phase 0 perf budget, runnable on demand: apply the `bench` label to a PR
# or dispatch manually. Kept off the every-push path to save runner minutes.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  bench:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'bench'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Run CI-runnable slice of the Phase 0 throughput benchmark
        env:
          # Runner-class floors: shared 4-vCPU runners are ~3x slower than the
          # dev machine (80 / 30 MB/s there). These guard regressions per
          # hardware class, not absolute UX targets.
          TERN_BENCH_CORE_FLOOR: "25"
          TERN_BENCH_HEADLESS_FLOOR: "12"
        # scripts/bench-ci.sh brings up the sshd rig, runs the headless pipeline
        # (russh -> coalescer -> sink, plus the xterm-headless consumer),
        # enforces thresholds, and writes bench-results.json.
        #
        # Called unconditionally: the old `if [ -x ... ]` guard dated from
        # before Spike 2 landed and would have turned a missing or
        # non-executable script into a silent pass.
        run: scripts/bench-ci.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          path: bench-results.json
          if-no-files-found: ignore
